<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <title>Dashboard</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          th:href="@{/css/dashboard.css}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
		  
		  <style>
		  		.logout-btn {
		  			background: transparent;
		  			border: none;
		  			cursor: pointer;
		  			padding: 0;
		  		}

		  		.logout-icon {
		  			width: 28px;
		  			height: 28px;
		  			filter: brightness(0) invert(1);
		  		}
		  	</style>

</head>

<body>

<div th:replace="~{fragments/header :: header('Dashboard')}">
</div>

<div class="container py-5">

    <div class="mb-5">

        <h1 class="dashboard-title">

            Welcome Back

        </h1>

        <p class="dashboard-subtitle">

            Choose an action to continue

        </p>

    </div>

    <!-- ADMIN -->

    <div sec:authorize="hasRole('ADMIN')">

        <div class="row g-4">

            <div class="col-md-3">

                <a th:href="@{/users}"
                   class="dashboard-card text-decoration-none">

                    <div class="card-icon">
                        👤
                    </div>

                    <h5>
                        Users
                    </h5>

                    <p>
                        Manage system users
                    </p>

                </a>

            </div>

            <div class="col-md-3">

                <a th:href="@{/departments}"
                   class="dashboard-card text-decoration-none">

                    <div class="card-icon">
                        🏢
                    </div>

                    <h5>
                        Departments
                    </h5>

                    <p>
                        Manage departments
                    </p>

                </a>

            </div>

        </div>

    </div>

    <!-- EMPLOYEE -->

    <div sec:authorize="hasRole('EMPLOYEE')">

        <div class="row g-4">

            

            <div class="col-md-3">

                <a th:href="@{/documents}"
                   class="dashboard-card text-decoration-none">

                    <div class="card-icon">
                        ➕
                    </div>

                    <h5>
                        Create Document
                    </h5>

                    <p>
                        Create a new request
                    </p>

                </a>

            </div>

        </div>

    </div>

    <!-- REVIEWER -->

    <div sec:authorize="hasRole('REVIEWER')">

        <div class="row g-4">

            <div class="col-md-3">

                <a th:href="@{workflow/reviewer}"
                   class="dashboard-card text-decoration-none">

                    <div class="card-icon">
                        🔍
                    </div>

                    <h5>
                        Pending Reviews
                    </h5>

                    <p>
                        Documents waiting for review
                    </p>

                </a>

            </div>

        </div>

    </div>

    <!-- APPROVER -->

    <div sec:authorize="hasRole('APPROVER')">

        <div class="row g-4">

            <div class="col-md-3">

                <a href="#"
                   class="dashboard-card text-decoration-none">

                    <div class="card-icon">
                        ✅
                    </div>

                    <h5>
                        Approval Queue
                    </h5>

                    <p>
                        Documents awaiting approval
                    </p>

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
