<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Documents</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header('Documents')}">
</div>

<div th:replace="~{fragments/toast :: toast}">
</div>

<div class="container mt-4">

    <!-- CREATE DOCUMENT -->

    <div class="card shadow mb-4">

        <div class="card-header">

            <h5 class="mb-0">

				<span th:text="${documentDto.id == null}
				 ? 'Create Document'
				 : 'Update Document'">
				</span>

            </h5>

        </div>

        <div class="card-body">

			<form th:action="${documentDto.id == null}
			       ? @{/documents/save}
			       : @{/documents/update/{id}(id=${documentDto.id})}"
			      th:object="${documentDto}"
			      method="post">

                <div class="row">

                    <div class="col-md-12 mb-3">

                        <label class="form-label">

                            Title

                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{title}"
                               placeholder="Enter Title">

                        <small class="text-danger"
                               th:if="${#fields.hasErrors('title')}"
                               th:errors="*{title}">
                        </small>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-12 mb-3">

                        <label class="form-label">

                            Description

                        </label>

                        <textarea class="form-control"
                                  rows="4"
                                  th:field="*{description}"
                                  placeholder="Enter Description">
                        </textarea>

                        <small class="text-danger"
                               th:if="${#fields.hasErrors('description')}"
                               th:errors="*{description}">
                        </small>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-10 mb-3">

                        <label class="form-label">

                            Approval Department

                        </label>

                        <select class="form-select"
                                th:field="*{departmentId}">

                            <option value="">

                                Select Department

                            </option>

                            <option th:each="dept : ${departments}"
                                    th:value="${dept.id}"
                                    th:text="${dept.departmentName}">
                            </option>

                        </select>

                        <small class="text-danger"
                               th:if="${#fields.hasErrors('departmentId')}"
                               th:errors="*{departmentId}">
                        </small>

                    </div>

                    <div class="col-md-2 d-flex align-items-end">

                        <button type="submit"
                                class="btn btn-primary w-100">

                            Save Draft

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <!-- DOCUMENT TABLE -->

    <div class="card shadow">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h5 class="mb-0">

                My Documents

            </h5>

            <form method="get"
                  th:action="@{/documents}"
                  class="d-flex"
                  style="max-width:300px;">

                <input type="text"
                       name="keyword"
                       class="form-control me-2"
                       placeholder="Search Document">

                <button class="btn btn-primary">

                    Search

                </button>

            </form>

        </div>

        <div class="card-body table-responsive">

            <table class="table table-bordered table-hover">

                <thead>

                <tr>

                    <th>Document No</th>
                    <th>Title</th>
                    <th>Department</th>
                    <th>Status</th>
                    <th>Actions</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="doc : ${documents}">

                    <td th:text="${doc.documentNumber}">
                    </td>

                    <td th:text="${doc.title}">
                    </td>

                    <td th:text="${doc.departmentName}">
                    </td>

                    

						<td>

						    <span th:if="${doc.status == 'DRAFT'}"
						          class="badge bg-secondary">

						        DRAFT

						    </span>

						    <span th:if="${doc.status == 'SUBMITTED'}"
						          class="badge bg-primary">

						        SUBMITTED

						    </span>

						</td>

                 

					<td>

					    <div th:if="${doc.status == 'DRAFT'}">

							<a th:href="@{/documents/edit/{id}(id=${doc.id})}"
							   class="btn btn-warning btn-sm">

							    Edit

							</a>

							<a th:href="@{/documents/submit/{id}(id=${doc.id})}"
							   class="btn btn-success btn-sm"
							   onclick="return confirm('Submit document?')">

							    Submit

							</a>

					    </div>

					</td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
