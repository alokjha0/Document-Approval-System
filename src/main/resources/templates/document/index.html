<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Documents</title>

	<!-- CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>

	<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

	<div th:replace="~{fragments/header :: header('Documents')}">
	</div>

	<div th:replace="~{fragments/toast :: toast}">
	</div>

	<div class="container mt-4">

		<!-- CREATE DOCUMENT -->

		<div class="card shadow mb-4">

			<div class="card-header">

				<h5 class="mb-0">

					<span th:text="${documentDto.id == null}
				 ? 'Create Request'
				 : 'Update Request'">
					</span>

				</h5>

			</div>

			<div class="card-body">

				<form th:action="${documentDto.id == null}
			       ? @{/documents/save}
			       : @{/documents/update/{id}(id=${documentDto.id})}" th:object="${documentDto}" method="post">


					<div class="row">

						<!-- Department -->

						<div class="col-md-6 mb-3">

							<label class="form-label">

								Request Department

							</label>

							<select class="form-select" id="departmentDropdown" th:field="*{departmentId}">

								<option value="">

									Select Department

								</option>

								<option th:each="dept : ${departments}" th:value="${dept.id}"
									th:text="${dept.departmentName}">
								</option>

							</select>

							<small class="text-danger" th:if="${#fields.hasErrors('departmentId')}"
								th:errors="*{departmentId}">
							</small>

						</div>

						<!-- Application -->

						<div class="col-md-6 mb-3">

							<label class="form-label">

								Request Type

							</label>

							<select class="form-select" id="applicationDropdown" th:field="*{applicationId}"
								th:attr="data-selected=*{applicationId}">

								<option value="">

									Select Application

								</option>

							</select>

							<small class="text-danger" th:if="${#fields.hasErrors('applicationId')}"
								th:errors="*{applicationId}">
							</small>

						</div>

					</div>

					<div class="row">

						<div class="col-md-12 mb-3">

							<label class="form-label">

								Request Title

							</label>

							<input type="text" class="form-control" th:field="*{title}" placeholder="Enter Title">

							<small class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
							</small>

						</div>

					</div>

					<div class="row">

						<div class="col-md-12 mb-3">

							<label class="form-label">

								Request Description

							</label>

							<textarea class="form-control" rows="2" th:field="*{description}"
								placeholder="Enter Description">
                        </textarea>

							<small class="text-danger" th:if="${#fields.hasErrors('description')}"
								th:errors="*{description}">
							</small>

						</div>

					</div>
			
					<div class="row">

					    <div class="col-md-12 mb-3">

					        <label class="form-label">

					            Document Content

					        </label>

					        <textarea
					            class="form-control"
					            rows="12"
					            th:field="*{documentContent}"
					            placeholder="Write the complete document here">
					        </textarea>

					        <small class="text-danger"
					               th:if="${#fields.hasErrors('documentContent')}"
					               th:errors="*{documentContent}">
					        </small>

					    </div>

					</div>


					<div class="col-md-2 d-flex align-items-end">

						<button type="submit" class="btn btn-primary w-100">

							Save Draft

						</button>

					</div>

			</div>

			</form>

		</div>

	</div>

	<!-- DOCUMENT TABLE -->

	<div class="card shadow">

		<div class="card-header d-flex justify-content-between align-items-center">

			<h5 class="mb-0">

				My Documents

			</h5>

			<form method="get" th:action="@{/documents}" class="d-flex" style="max-width:300px;">

				<input type="text" name="keyword" class="form-control me-2" placeholder="Search Document">

				<button class="btn btn-primary">

					Search

				</button>

			</form>

		</div>

		<div class="card-body table-responsive">

			<table class="table table-bordered table-hover">

				<thead>

					<tr>

						<th>Document No</th>
						<th>Department</th>
						<th>Application</th>
						<th>Title</th>
						<th>Status</th>
						<th>Actions</th>

					</tr>

				</thead>

				<tbody>

					<tr th:each="doc : ${documents}">

						<td th:text="${doc.documentNumber}">
						</td>


						<td th:text="${doc.departmentName}">
						</td>

						<td th:text="${doc.applicationName}">
						<td th:text="${doc.title}">
						</td>
						</td>

						<td>

							<span th:if="${doc.status == 'DRAFT'}" class="badge bg-secondary">

								DRAFT

							</span>

							<span th:if="${doc.status == 'SUBMITTED'}" class="badge bg-primary">

								SUBMITTED

							</span>

							<span th:if="${doc.status == 'UNDER_REVIEW'}" class="badge bg-warning text-dark">

								UNDER REVIEW

							</span>

							<span th:if="${doc.status == 'APPROVED'}" class="badge bg-success">

								APPROVED

							</span>

							<span th:if="${doc.status == 'REJECTED'}" class="badge bg-danger">

								REJECTED

							</span>

							<span th:if="${doc.status == 'ADDITIONAL_INFO_REQUESTED'}" class="badge bg-info text-dark">

								INFO REQUESTED

							</span>

							<span th:if="${doc.status == 'RESUBMITTED'}" class="badge bg-info">

								RESUBMITTED

							</span>

						</td>

						<td>

							<div th:if="${doc.status == 'DRAFT'}">

								<a th:href="@{/documents/edit/{id}(id=${doc.id})}" class="btn btn-warning btn-sm">

									Edit

								</a>

								<a th:href="@{/documents/submit/{id}(id=${doc.id})}" class="btn btn-success btn-sm"
									onclick="return confirm('Submit document?')">

									Submit

								</a>

							</div>
							<div th:unless="${doc.status == 'DRAFT'}">

							    <a th:href="@{/documents/view/{id}(id=${doc.id})}"
							       class="btn btn-primary btn-sm">

							        View

							    </a>

							</div>



						</td>

					</tr>

				</tbody>

			</table>

		</div>

	</div>

	</div>

	<script>

		function loadApplications(departmentId, selectedApplicationId = null) {

			let applicationDropdown =
				document.getElementById("applicationDropdown");

			applicationDropdown.innerHTML =
				'<option value="">Select Application</option>';

			if (!departmentId) {
				return;
			}

			fetch('/applications/by-department/' + departmentId)

				.then(response => response.json())

				.then(data => {

					data.forEach(application => {

						let option =
							document.createElement("option");

						option.value = application.id;

						option.text =
							application.applicationName;

						if (selectedApplicationId &&
							application.id == selectedApplicationId) {

							option.selected = true;
						}

						applicationDropdown.appendChild(option);

					});

				});
		}

		document.getElementById("departmentDropdown")
			.addEventListener("change", function () {

				loadApplications(this.value);

			});

		window.onload = function () {

			let departmentId =
				document.getElementById("departmentDropdown").value;

			let applicationId =
				document.getElementById("applicationDropdown")
					.getAttribute("data-selected");

			if (departmentId) {

				loadApplications(
					departmentId,
					applicationId
				);

			}

		};

	</script>
</body>

</html>
