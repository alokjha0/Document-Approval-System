<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Respond to Request</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

	<div th:replace="~{fragments/header :: header('Respond to Request')}">
	</div>

	<div class="container mt-4">

		<div class="card shadow">

			<div class="card-header">

				<h4 class="mb-0">

					Update Request

				</h4>

			</div>

			<div class="card-body">

				<form th:action="@{/documents/respond/{id}(id=${documentDto.id})}" th:object="${documentDto}"
					method="post">

					<!-- Department -->
					<div class="mb-2">
						<span class="fw-semibold">
							Request Department :
							<span th:text="${documentDto.departmentName}"></span>
						</span>
					</div>

					<!-- Application -->
					<div class="mb-3">
						<span class="fw-semibold">
							Request Type :
							<span th:text="${documentDto.applicationName}"></span>
						</span>
					</div>
					<!-- Title -->

					<div class="mb-3">

						<span class="fw-semibold">
							Request Title :
							<span th:text="${documentDto.title}"></span>
						</span>
					</div>

					<!-- Description -->

					<div class="mb-3">

						<label class="form-label">

							Request Description :

						</label>

						<textarea class="form-control" rows="2" th:field="*{description}">
                    </textarea>

					</div>

					<div class="mb-3">

					    <label class="form-label">

					        Document Content

					    </label>

					    <textarea
					        class="form-control"
					        rows="12"
					        th:field="*{documentContent}">
					    </textarea>

					</div>
					

					<!-- Response Comment -->

					<div class="mb-4">

						<label class="form-label">

							Response Comment


						</label>

						<textarea class="form-control" th:field="*{responseComment}" rows="2" required
							placeholder="Describe what changes you made">
						</textarea>

					</div>

					<div class="d-flex gap-2">

						<button type="submit" class="btn btn-success">

							Submit Response

						</button>

						<a th:href="@{/documents/view/{id}(id=${documentDto.id})}" class="btn btn-secondary">

							Cancel

						</a>

					</div>

				</form>

			</div>

		</div>

	</div>

</body>

</html>
