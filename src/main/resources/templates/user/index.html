<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Users</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div th:replace="~{fragments/toast :: toast}"></div>

<div class="container mt-4">

    <!-- CREATE / UPDATE USER -->

    <div class="card shadow mb-4">

        <div class="card-header">

            <h5 class="mb-0">

                <span th:text="${user.id == null}
                ? 'Create User'
                : 'Update User'">
                </span>

            </h5>

        </div>

        <div class="card-body">

            <form th:action="${user.id == null}
                  ? @{/users/save}
                  : @{/users/update/{id}(id=${user.id})}"
                  th:object="${user}"
                  method="post">

				  <div class="row mb-3">

				      <div class="col-lg-4 col-md-6 col-12">

				          <label class="form-label">
				              Employee ID *
				          </label>

				          <input type="text"
				                 class="form-control"
				                 th:field="*{empId}"
				                 placeholder="Enter Employee ID"
				                 required>

				          <small class="text-danger"
				                 th:if="${#fields.hasErrors('empId')}"
				                 th:errors="*{empId}">
				          </small>

				      </div>

				      <div class="col-md-4">

				          <label class="form-label">
				              Name *
				          </label>

				          <input type="text"
				                 class="form-control"
				                 th:field="*{name}"
				                 placeholder="Enter Name"
				                 required>

				          <small class="text-danger"
				                 th:if="${#fields.hasErrors('name')}"
				                 th:errors="*{name}">
				          </small>

				      </div>

				      <div class="col-md-4">

				          <label class="form-label">
				              Email *
				          </label>

				          <input type="email"
				                 class="form-control"
				                 th:field="*{email}"
				                 placeholder="Enter Email"
				                 required>

				          <small class="text-danger"
				                 th:if="${#fields.hasErrors('email')}"
				                 th:errors="*{email}">
				          </small>

				      </div>

				  </div>

				  <div class="row mb-3">

				      <div class="col-md-4">

				          <label class="form-label">
				              Password *
				          </label>

				          <input type="password"
				                 class="form-control"
				                 th:field="*{password}"
				                 placeholder="Enter Password"
				                 required>

				          <small class="text-danger"
				                 th:if="${#fields.hasErrors('password')}"
				                 th:errors="*{password}">
				          </small>

				      </div>

				      <div class="col-md-4">

				          <label class="form-label">
				              Role *
				          </label>

				          <select class="form-select"
				                  th:field="*{role}"
				                  required>

				              <option value="">
				                  Select Role
				              </option>

				              <option th:each="role : ${roles}"
				                      th:value="${role}"
				                      th:text="${role}">
				              </option>

				          </select>

				          <small class="text-danger"
				                 th:if="${#fields.hasErrors('role')}"
				                 th:errors="*{role}">
				          </small>

				      </div>

				      <div class="col-md-4">

				          <label class="form-label">
				              Department *
				          </label>

				          <select class="form-select"
				                  th:field="*{departmentId}"
				                  required>

				              <option value="">
				                  Select Department
				              </option>

				              <option th:each="department : ${departments}"
				                      th:value="${department.id}"
				                      th:text="${department.departmentName}">
				              </option>

				          </select>

				          <small class="text-danger"
				                 th:if="${#fields.hasErrors('departmentId')}"
				                 th:errors="*{departmentId}">
				          </small>

				      </div>

				  </div>

                <div class="row">

                    <div class="col-md-2">

                        <button type="submit"
                                class="btn btn-primary w-100">

                            <span th:text="${user.id == null}
                            ? 'Save'
                            : 'Update'">
                            </span>

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <!-- USER TABLE -->

    <div class="card shadow">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h5 class="mb-0">
                User List
            </h5>

            <form method="get"
                  th:action="@{/users}"
                  class="d-flex"
                  style="max-width:300px;">

                <input type="text"
                       name="keyword"
                       class="form-control me-2"
                       th:value="${keyword}"
                       placeholder="Search User">

                <button class="btn btn-primary">
                    Search
                </button>

            </form>

        </div>

        <div class="card-body table-responsive">

            <table class="table table-bordered table-hover">
                <thead>

                <tr>

                    <th>ID</th>
                    <th>Employee ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Department</th>
                    <th>Actions</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="user : ${users.content}">

                    <td th:text="${user.id}"></td>

                    <td th:text="${user.empId}"></td>

                    <td th:text="${user.name}"></td>

                    <td th:text="${user.email}"></td>

                    <td th:text="${user.role}"></td>

                    <td th:text="${user.departmentName}"></td>

                    <td>

                        <a th:href="@{/users/edit/{id}(id=${user.id})}"
                           class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a th:href="@{/users/delete/{id}(id=${user.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete User ?')">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

            <!-- PAGINATION -->

            <nav>

                <ul class="pagination justify-content-center flex-wrap">

                    <li class="page-item"
                        th:classappend="${users.first} ? 'disabled'">

                        <a class="page-link"
                           th:href="@{/users(page=${users.number-1},keyword=${keyword})}">

                            Previous

                        </a>

                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0,users.totalPages-1)}">

                        <a class="page-link"
                           th:text="${i+1}"
                           th:href="@{/users(page=${i},keyword=${keyword})}">
                        </a>

                    </li>

					<li class="page-item"
					    th:classappend="${users.last} ? 'disabled'">

                        <a class="page-link"
                           th:href="@{/users(page=${users.number+1},keyword=${keyword})}">

                            Next

                        </a>

                    </li>

                </ul>

            </nav>

        </div>

    </div>

</div>

</body>
</html>
