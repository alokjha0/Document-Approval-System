<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Approve Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header('Approve Document')}">
</div>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h5 class="mb-0">

                Document Details

            </h5>

        </div>

        <div class="card-body">

            <div class="row mb-3">

                <div class="col-md-3">
                    <strong>Document Number</strong>
                </div>

                <div class="col-md-9"
                     th:text="${document.documentNumber}">
                </div>

            </div>

            <div class="row mb-3">

                <div class="col-md-3">
                    <strong>Title</strong>
                </div>

                <div class="col-md-9"
                     th:text="${document.title}">
                </div>

            </div>

            <div class="row mb-3">

                <div class="col-md-3">
                    <strong>Description</strong>
                </div>

                <div class="col-md-9"
                     th:text="${document.description}">
                </div>

            </div>

            <div class="row mb-3">

                <div class="col-md-3">
                    <strong>Submitted By</strong>
                </div>

                <div class="col-md-9"
                     th:text="${document.submittedBy}">
                </div>

            </div>

            <div class="row mb-3">

                <div class="col-md-3">
                    <strong>Requestor Department</strong>
                </div>

                <div class="col-md-9"
                     th:text="${document.requestorDepartment}">
                </div>

            </div>

            <div class="row mb-3">

                <div class="col-md-3">
                    <strong>Status</strong>
                </div>

                <div class="col-md-9"
                     th:text="${document.status}">
                </div>

            </div>

            <div class="row mb-4">

                <div class="col-md-3">
                    <strong>Current Stage</strong>
                </div>

                <div class="col-md-9"
                     th:text="${document.currentStage}">
                </div>

            </div>

            <hr>

            <div class="d-flex gap-2">

                <a th:href="@{/workflow/approver/approve/{id}(id=${document.taskId})}"
                   class="btn btn-success"
                   onclick="return confirm('Approve document?')">

                    Approve

                </a>

				<a th:href="@{/workflow/approver/request-info/{id}(id=${document.taskId})}"
				   class="btn btn-warning"
				   onclick="return confirm('Request additional information?')">

				    Request Info

				</a>

				<a th:href="@{/workflow/approver/reject/{id}(id=${document.taskId})}"
							   class="btn btn-danger"
							   onclick="return confirm('Reject document?')">

							    Reject

							</a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
