<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Approve Document</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>

	<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

	<div th:replace="~{fragments/header :: header('Approve Document')}">
	</div>

	<div class="container mt-4">

		<div class="card shadow">

			<div class="card-header">

				<h5 class="mb-0">

					Document Details

				</h5>

			</div>

			<div class="card-body">

				<div class="row mb-3">

					<div class="col-md-3">
						<strong>Document Number</strong>
					</div>

					<div class="col-md-9" th:text="${document.documentNumber}">
					</div>

				</div>

				<div class="row mb-3">

					<div class="col-md-3">
						<strong>Title</strong>
					</div>

					<div class="col-md-9" th:text="${document.title}">
					</div>

				</div>

				<div class="row mb-3">

					<div class="col-md-3">
						<strong>Description</strong>
					</div>

					<div class="col-md-9" th:text="${document.description}">
					</div>

				</div>

				<div class="row mb-3">

					<div class="col-md-3">
						<strong>Submitted By</strong>
					</div>

					<div class="col-md-9" th:text="${document.submittedBy}">
					</div>

				</div>

				<div class="row mb-3">

					<div class="col-md-3">
						<strong>Requestor Department</strong>
					</div>

					<div class="col-md-9" th:text="${document.requestorDepartment}">
					</div>

				</div>

				<div class="row mb-3">

					<div class="col-md-3">
						<strong>Status</strong>
					</div>

					<div class="col-md-9" th:text="${document.status}">
					</div>

				</div>

				<div class="row mb-4">

					<div class="col-md-3">
						<strong>Current Stage</strong>
					</div>

					<div class="col-md-9" th:text="${document.currentStage}">
					</div>

				</div>

				<div class="card shadow-sm mb-4">

								    <div class="card-header">
								        <h5 class="mb-0">
								            Document PDF
								        </h5>
								    </div>

								    <div class="card-body">

								        <div class="d-flex gap-2">

								            <a class="btn btn-primary"
								               target="_blank"
								              th:href="@{/documents/{id}/pdf/view(id=${document.documentId})}">

								                <i class="bi bi-eye"></i>
								                View PDF

								            </a>

								            <a class="btn btn-success"
								              th:href="@{/documents/{id}/pdf/download(id=${document.documentId})}">

								                <i class="bi bi-download"></i>
								                Download PDF

								            </a>

								        </div>

								    </div>

								</div>
			
				<hr>
				<div class="d-flex gap-2">

					<a th:href="@{/workflow/approver/approve/{id}(id=${document.taskId})}" class="btn btn-success"
						onclick="return confirm('Approve document?')">

						Approve

					</a>

					<button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#requestInfoModal">

						Request Info

					</button>

					<button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#rejectModal">

						Reject

					</button>

				</div>

			</div>

		</div>

	</div>

	<div class="modal fade" id="requestInfoModal" tabindex="-1">

		<div class="modal-dialog">

			<div class="modal-content">

				<form th:action="@{/workflow/approver/request-info/{taskId}(taskId=${document.taskId})}" method="post">

					<div class="modal-header">

						<h5 class="modal-title">

							Request Information

						</h5>

						<button type="button" class="btn-close" data-bs-dismiss="modal">
						</button>

					</div>

					<div class="modal-body">

						<label class="form-label">

							Comment

						</label>

						<textarea class="form-control" name="comment" rows="4" required
							placeholder="Enter reason for requesting additional information"></textarea>

					</div>

					<div class="modal-footer">

						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">

							Cancel

						</button>

						<button type="submit" class="btn btn-warning">

							Submit

						</button>

					</div>

				</form>

			</div>

		</div>

	</div>

	<div class="modal fade" id="rejectModal" tabindex="-1">

		<div class="modal-dialog">

			<div class="modal-content">

				<form th:action="@{/workflow/approver/reject/{taskId}(taskId=${document.taskId})}" method="post">

					<div class="modal-header bg-danger text-white">

						<h5 class="modal-title">

							Reject Document

						</h5>

						<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal">
						</button>

					</div>

					<div class="modal-body">

						<label class="form-label">

							Reason

						</label>

						<textarea class="form-control" name="comment" rows="4" required
							placeholder="Enter reason for rejection"></textarea>

					</div>

					<div class="modal-footer">

						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">

							Cancel

						</button>

						<button type="submit" class="btn btn-danger">

							Reject

						</button>

					</div>

				</form>

			</div>

		</div>

	</div>


</body>

</html>
