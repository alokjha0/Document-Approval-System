<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Senior Approver Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header('Approver Dashboard')}">
</div>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h5 class="mb-0">

                Pending Final Approvals
            </h5>

        </div>

        <div class="card-body table-responsive">

            <table class="table table-bordered table-hover">

                <thead>

                <tr>

                    <th>Document No</th>
                    <th>Title</th>
                    <th>Submitted By</th>
                    <th>Requestor Department</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="task : ${tasks}">

                    <td th:text="${task.documentNumber}">
                    </td>

                    <td th:text="${task.title}">
                    </td>

                    <td th:text="${task.submittedBy}">
                    </td>

                    <td th:text="${task.requestorDepartment}">
                    </td>

                    <td>

						<a th:href="@{/workflow/senior-approver/review/{id}(id=${task.taskId})}"
						   class="btn btn-primary btn-sm">

						    Review

						</a>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
